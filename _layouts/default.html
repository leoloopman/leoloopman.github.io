<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {%- if page.title -%}{{ page.title }} · {{ site.title }}{%- else -%}{{ site.title }}{%- endif -%}
    </title>
    <meta name="description" content="{{ site.description | default: site.title }}" />

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <a class="skip" href="#content">Skip to content</a>

    <header class="site-header">
      <div class="wrap">
        <div class="brand">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          {%- if site.description and site.description != "" -%}
            <div class="site-desc">{{ site.description }}</div>
          {%- endif -%}
        </div>
      </div>
    </header>

    <main id="content" class="wrap">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <span class="muted">© {{ site.time | date: '%Y' }} {{ site.title }}</span>
      </div>
    </footer>
  </body>
</html>
