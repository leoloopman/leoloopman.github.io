---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta muted">{{ page.date | date: "%Y-%m-%d" }}</div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="post-footer">
    <a class="muted" href="{{ '/' | relative_url }}">← Home</a>
  </div>
</article>
